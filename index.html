<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALEKS Calendar</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#171b22;
      --panel2:#1d2330;
      --text:#eef2f7;
      --muted:#aab3c2;
      --line:#2a3242;
      --accent:#5da8ff;
      --good:#2ecc71;
      --warn:#f1c40f;
      --bad:#e74c3c;
      --today:#3498db;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:1300px;margin:0 auto;padding:20px}
    .topbar,.panel,.card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
    }
    .topbar{
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 18px;margin-bottom:16px;
    }
    .layout{
      display:grid;
      grid-template-columns:280px 1fr;
      gap:16px;
    }
    .panel{padding:16px}
    .sidebar h3,.content h2{margin-top:0}
    .content{display:grid;gap:16px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .tab-btn,button{
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      border-radius:10px;
      padding:10px 14px;
      cursor:pointer;
    }
    .tab-btn.active{outline:2px solid var(--accent)}
    input,select,textarea{
      width:100%;
      padding:10px 12px;
      background:#10141b;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:10px;
      margin-top:6px;
    }
    textarea{min-height:90px;resize:vertical}
    .grid{display:grid;gap:12px}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .card{padding:14px}
    .muted{color:var(--muted)}
    .hidden{display:none !important}
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      text-align:left;
      vertical-align:top;
    }
    .progress{
      height:14px;background:#0e1218;border-radius:999px;overflow:hidden;border:1px solid var(--line)
    }
    .progress > div{height:100%;background:var(--accent)}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;border:1px solid var(--line);font-size:12px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .lesson-strip{line-height:2}
    .status-good{color:var(--good)}
    .status-bad{color:var(--bad)}
    .status-today{color:var(--today)}
    .auth-box{max-width:460px;margin:50px auto}
    @media (max-width: 960px){
      .layout{grid-template-columns:1fr}
      .grid-2,.grid-3{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div id="authView" class="auth-box panel">
    <h2>ALEKS Calendar</h2>
    <p class="muted">Teacher sign in</p>
    <div class="grid">
      <label>Email<input id="email" type="email" /></label>
      <label>Password<input id="password" type="password" /></label>
      <div class="row">
        <button id="signInBtn">Sign in</button>
        <h1 style="color:red;">GITHUB TEST BUILD 123</h1>
<button id="signInBtn" onclick="alert('physical click works')">Sign in</button>
        <button id="signUpBtn">Create account</button>
        <button id="signOutBtn" class="hidden">Sign out</button>
      </div>
      <div id="authMsg" class="muted"></div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <div class="topbar">
      <div>
        <strong>ALEKS Calendar</strong>
        <div class="muted" id="teacherInfo"></div>
      </div>
      <button id="logoutBtn">Sign out</button>
    </div>

    <div class="layout">
      <aside class="sidebar panel">
        <h3>Settings</h3>

        <div class="card">
          <label>Teaching days</label>
          <div class="grid">
            <label><input type="checkbox" class="dayCheck" value="0"> Monday</label>
            <label><input type="checkbox" class="dayCheck" value="1"> Tuesday</label>
            <label><input type="checkbox" class="dayCheck" value="2"> Wednesday</label>
            <label><input type="checkbox" class="dayCheck" value="3"> Thursday</label>
            <label><input type="checkbox" class="dayCheck" value="4"> Friday</label>
            <label><input type="checkbox" class="dayCheck" value="5"> Saturday</label>
            <label><input type="checkbox" class="dayCheck" value="6"> Sunday</label>
          </div>
          <button id="saveDaysBtn" style="margin-top:10px;">Save teaching days</button>
        </div>

        <div class="card" style="margin-top:12px;">
          <h4>Holiday ranges</h4>
          <div class="grid">
            <label>Start<input type="date" id="holidayStart"></label>
            <label>End<input type="date" id="holidayEnd"></label>
            <button id="addHolidayBtn">Add holiday range</button>
          </div>
          <div id="holidayList" style="margin-top:10px;"></div>
        </div>
      </aside>

      <main class="content">
        <div class="panel">
          <div class="tabs">
            <button class="tab-btn active" data-tab="dashboardTab">Dashboard</button>
            <button class="tab-btn" data-tab="manageTab">Manage cycles & students</button>
          </div>

          <section id="dashboardTab">
            <div class="grid grid-2">
              <label>Cycle
                <select id="dashCycle"></select>
              </label>
              <label>Student
                <select id="dashStudent"></select>
              </label>
            </div>

            <div id="dashboardBody" class="grid" style="margin-top:14px;"></div>
          </section>

          <section id="manageTab" class="hidden">
            <div class="grid">
              <div class="card">
                <h3>Cycles</h3>
                <div class="grid grid-2">
                  <label>Start date<input type="date" id="newCycleStart"></label>
                  <label>End date<input type="date" id="newCycleEnd"></label>
                </div>
                <button id="addCycleBtn" style="margin-top:10px;">Add cycle</button>
                <div id="cycleList" style="margin-top:12px;"></div>
              </div>

              <div class="card">
                <h3>Students</h3>
                <div class="row">
                  <input id="newStudentName" placeholder="Add student name" />
                  <button id="addStudentBtn">Add student</button>
                </div>
                <div id="studentList" style="margin-top:12px;"></div>
              </div>

              <div class="card">
                <h3>Cycle goals</h3>
                <div class="grid grid-2">
                  <label>Cycle
                    <select id="goalCycle"></select>
                  </label>
                </div>
                <div id="goalList" style="margin-top:12px;"></div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL = 'https://mcoxldezvehdnzcixiqt.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_OvT-9qgK6f5j7jBeb6rnJg_Ag93azAf';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const state = {
    user: null,
    settings: { teaching_days: [0,1,3,4] },
    holidays: [],
    cycles: [],
    students: [],
    goals: [],
    logs: []
  };

  const $ = (id) => document.getElementById(id);
  const dayChecks = () => [...document.querySelectorAll('.dayCheck')];
  const formatDate = (d) => new Date(d + 'T00:00:00').toISOString().slice(0,10);
  const parseDate = (d) => new Date(d + 'T00:00:00');
  const todayIso = () => new Date().toISOString().slice(0,10);

  function clamp01(x){ return Math.max(0, Math.min(1, x)); }
  function safeDiv(n,d){ return d > 0 ? n / d : 0; }

  function expandHolidayDates(ranges){
    const out = new Set();
    for (const r of ranges){
      let d = parseDate(r.start_date);
      const end = parseDate(r.end_date);
      while (d <= end){
        out.add(d.toISOString().slice(0,10));
        d.setDate(d.getDate() + 1);
      }
    }
    return [...out].sort();
  }

  function lessonDates(startIso, endIso, teachingDays, holidayDates){
    const holidays = new Set(holidayDates);
    const out = [];
    let d = parseDate(startIso);
    const end = parseDate(endIso);
    while (d <= end){
      const iso = d.toISOString().slice(0,10);
      const jsDay = (d.getDay() + 6) % 7;
      if (teachingDays.includes(jsDay) && !holidays.has(iso)) out.push(iso);
      d.setDate(d.getDate() + 1);
    }
    return out;
  }

  function teachingDatesIncludingHolidays(startIso, endIso, teachingDays){
    const out = [];
    let d = parseDate(startIso);
    const end = parseDate(endIso);
    while (d <= end){
      const iso = d.toISOString().slice(0,10);
      const jsDay = (d.getDay() + 6) % 7;
      if (teachingDays.includes(jsDay)) out.push(iso);
      d.setDate(d.getDate() + 1);
    }
    return out;
  }

  function statusEmoji(iso){
    const today = todayIso();
    if (iso < today) return '<span class="status-bad">🟥</span>';
    if (iso === today) return '<span class="status-today">🟦</span>';
    return '<span class="status-good">🟩</span>';
  }

  function cycleStats(logs, lessonDayCount){
    const total = logs.reduce((a,b) => a + (b.topics_completed || 0), 0);
    const distinctDays = new Set(logs.map(x => x.log_date)).size;
    const pace = safeDiv(total, distinctDays);
    const projected = pace * lessonDayCount;
    const avgFocus = logs.length ? logs.reduce((a,b)=>a + (b.focus || 0),0) / logs.length : 0;
    const avgDisruption = logs.length ? logs.reduce((a,b)=>a + (b.disruption || 0),0) / logs.length : 0;
    return { total, distinctDays, pace, projected, avgFocus, avgDisruption };
  }

  async function ensureTeacherProfile(){
    const { data: existing } = await supabase
      .from('teacher_profiles')
      .select('id')
      .eq('id', state.user.id)
      .maybeSingle();

    if (!existing) {
      await supabase.from('teacher_profiles').insert({
        id: state.user.id,
        display_name: state.user.email
      });
    }

    const { data: settings } = await supabase
      .from('teacher_settings')
      .select('*')
      .eq('teacher_id', state.user.id)
      .maybeSingle();

    if (!settings){
      await supabase.from('teacher_settings').insert({
        teacher_id: state.user.id,
        teaching_days: [0,1,3,4]
      });
    }
  }

  async function loadAll(){
    await ensureTeacherProfile();

    const [{ data: settings }, { data: holidays }, { data: cycles }, { data: students }] = await Promise.all([
      supabase.from('teacher_settings').select('*').eq('teacher_id', state.user.id).single(),
      supabase.from('holiday_ranges').select('*').order('start_date'),
      supabase.from('cycles').select('*').order('start_date', { ascending:false }),
      supabase.from('students').select('*').order('name')
    ]);

    state.settings = settings || { teaching_days:[0,1,3,4] };
    state.holidays = holidays || [];
    state.cycles = cycles || [];
    state.students = students || [];

    await loadGoals();
    renderSettings();
    renderCycleSelectors();
    renderManage();
    await renderDashboard();
  }

  async function loadGoals(){
    const cycleId = $('goalCycle').value || state.cycles[0]?.id;
    if (!cycleId) {
      state.goals = [];
      return;
    }
    const { data } = await supabase
      .from('cycle_goals')
      .select('*')
      .eq('cycle_id', cycleId);
    state.goals = data || [];
  }

  function renderSettings(){
    const teachingDays = state.settings?.teaching_days || [0,1,3,4];
    dayChecks().forEach(cb => cb.checked = teachingDays.includes(Number(cb.value)));

    $('holidayList').innerHTML = state.holidays.length
      ? `<table>
          <thead><tr><th>Start</th><th>End</th><th></th></tr></thead>
          <tbody>
            ${state.holidays.map(h => `
              <tr>
                <td>${h.start_date}</td>
                <td>${h.end_date}</td>
                <td><button onclick="window.deleteHoliday(${h.id})">Delete</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>`
      : `<div class="muted">No holiday ranges set.</div>`;
  }

  function renderCycleSelectors(){
    const cycleOptions = state.cycles.map(c =>
      `<option value="${c.id}">${c.start_date} → ${c.end_date}</option>`
    ).join('');

    $('dashCycle').innerHTML = cycleOptions;
    $('goalCycle').innerHTML = cycleOptions;

    const studentOptions = state.students.map(s =>
      `<option value="${s.id}">${s.name}</option>`
    ).join('');
    $('dashStudent').innerHTML = studentOptions;
  }

  function renderManage(){
    $('cycleList').innerHTML = state.cycles.length
      ? `<table>
          <thead><tr><th>Range</th><th></th></tr></thead>
          <tbody>
            ${state.cycles.map(c => `
              <tr>
                <td>${c.start_date} → ${c.end_date}</td>
                <td><button onclick="window.deleteCycle(${c.id})">Delete</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>`
      : `<div class="muted">No cycles yet.</div>`;

    $('studentList').innerHTML = state.students.length
      ? `<table>
          <thead><tr><th>Name</th><th></th></tr></thead>
          <tbody>
            ${state.students.map(s => `
              <tr>
                <td>${s.name}</td>
                <td><button onclick="window.deleteStudent(${s.id})">Delete</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>`
      : `<div class="muted">No students yet.</div>`;

    renderGoalList();
  }

  function renderGoalList(){
    const cycleId = Number($('goalCycle').value);
    if (!cycleId || !state.students.length){
      $('goalList').innerHTML = `<div class="muted">Create a cycle and at least one student.</div>`;
      return;
    }

    const goalMap = new Map(state.goals.map(g => [g.student_id, g]));
    $('goalList').innerHTML = `
      <table>
        <thead><tr><th>Student</th><th>Goal topics</th><th></th></tr></thead>
        <tbody>
          ${state.students.map(s => {
            const existing = goalMap.get(s.id);
            return `
              <tr>
                <td>${s.name}</td>
                <td><input id="goal_${s.id}" type="number" min="0" value="${existing?.goal_topics ?? 0}" /></td>
                <td><button onclick="window.saveGoal(${cycleId}, ${s.id})">Save</button></td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;
  }

  async function renderDashboard(){
    const cycleId = Number($('dashCycle').value);
    const studentId = Number($('dashStudent').value);

    if (!cycleId || !studentId){
      $('dashboardBody').innerHTML = `<div class="muted">Create a cycle and add students.</div>`;
      return;
    }

    const cycle = state.cycles.find(c => c.id === cycleId);
    const student = state.students.find(s => s.id === studentId);

    const holidayDates = expandHolidayDates(state.holidays);
    const teachingDays = state.settings?.teaching_days || [0,1,3,4];
    const cycleLessonDates = lessonDates(cycle.start_date, cycle.end_date, teachingDays, holidayDates);

    const { data: logs } = await supabase
      .from('daily_logs')
      .select('*')
      .eq('student_id', studentId)
      .gte('log_date', cycle.start_date)
      .lte('log_date', cycle.end_date)
      .order('log_date', { ascending: false });

    const { data: goalRow } = await supabase
      .from('cycle_goals')
      .select('*')
      .eq('cycle_id', cycleId)
      .eq('student_id', studentId)
      .maybeSingle();

    const goal = goalRow?.goal_topics || 0;
    const stats = cycleStats(logs || [], cycleLessonDates.length);
    const loggedDates = new Set((logs || []).map(l => l.log_date));

    const strip = cycleLessonDates.map(d => `${statusEmoji(d)}${d.slice(5)}${loggedDates.has(d) ? '✓' : ''}`).join(' ');
    const remaining = Math.max(0, goal - stats.total);
    const progressActual = goal ? clamp01(Math.min(stats.total, goal) / goal) * 100 : 0;
    const progressProjected = goal ? clamp01(Math.min(stats.projected, goal) / goal) * 100 : 0;
    const focusPct = clamp01(stats.avgFocus / 5) * 100;
    const disruptionPct = clamp01(stats.avgDisruption / 5) * 100;

    const missingDates = cycleLessonDates.filter(d => !loggedDates.has(d));

    $('dashboardBody').innerHTML = `
      <div class="grid grid-2">
        <div class="card">
          <h3>${student.name}</h3>
          <div>Goal: <strong>${goal || '(not set)'}</strong></div>
          <div>Completed: <strong>${stats.total}</strong></div>
          <div>Remaining: <strong>${remaining}</strong></div>
          <div>Pace: <strong>${stats.pace.toFixed(2)}</strong> topics/logged day</div>
          <div>Projected: <strong>${stats.projected.toFixed(1)}</strong></div>
        </div>

        <div class="card">
          <div>Progress</div>
          <div class="progress"><div style="width:${progressActual}%"></div></div>
          <div class="muted">Actual</div>
          <div style="height:10px"></div>
          <div class="progress"><div style="width:${progressProjected}%"></div></div>
          <div class="muted">Projected</div>
          <div style="height:10px"></div>
          <div>Focus</div>
          <div class="progress"><div style="width:${focusPct}%"></div></div>
          <div style="height:10px"></div>
          <div>Disruption</div>
          <div class="progress"><div style="width:${disruptionPct}%"></div></div>
        </div>
      </div>

      <div class="card">
        <h3>Daily report</h3>
        <div class="lesson-strip">${strip || '<span class="muted">No lesson days in this cycle.</span>'}</div>
      </div>

      <div class="card">
        <h3>Add daily report</h3>
        ${
          missingDates.length ? `
          <div class="grid grid-3">
            <label>Date<select id="newLogDate">${missingDates.map(d => `<option value="${d}">${d}</option>`).join('')}</select></label>
            <label>Minutes<input id="newMinutes" type="number" min="0" value="50"></label>
            <label>Topics<input id="newTopics" type="number" min="0" value="0"></label>
            <label>Focus<input id="newFocus" type="number" min="1" max="5" value="3"></label>
            <label>Disruption<input id="newDisruption" type="number" min="0" max="5" value="0"></label>
            <label>Note<textarea id="newNote"></textarea></label>
          </div>
          <button style="margin-top:10px;" onclick="window.addLog(${studentId})">Add report</button>
          ` : `<div class="muted">All lesson days in this cycle already have a report.</div>`
        }
      </div>

      <div class="card">
        <h3>Existing entries</h3>
        ${
          logs?.length ? `
          <table>
            <thead>
              <tr><th>Date</th><th>Minutes</th><th>Topics</th><th>Focus</th><th>Disruption</th><th>Note</th><th></th></tr>
            </thead>
            <tbody>
              ${logs.map(l => `
                <tr>
                  <td>${l.log_date}</td>
                  <td>${l.minutes_in_aleks}</td>
                  <td>${l.topics_completed}</td>
                  <td>${l.focus}</td>
                  <td>${l.disruption}</td>
                  <td>${l.note || ''}</td>
                  <td><button onclick="window.deleteLog(${l.id})">Delete</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          ` : `<div class="muted">No daily logs yet.</div>`
        }
      </div>
    `;
  }

  async function signIn(){
    const email = $('email').value.trim();
    const password = $('password').value.trim();
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    $('authMsg').textContent = error ? error.message : 'Signed in.';
  }

  async function signUp(){
    const email = $('email').value.trim();
    const password = $('password').value.trim();
    const { error } = await supabase.auth.signUp({ email, password });
    $('authMsg').textContent = error ? error.message : 'Account created. Check email if confirmation is enabled.';
  }

  async function signOut(){
    await supabase.auth.signOut();
  }

  async function saveTeachingDays(){
    const teaching_days = dayChecks().filter(x => x.checked).map(x => Number(x.value)).sort((a,b)=>a-b);
    const payload = { teacher_id: state.user.id, teaching_days };
    const { error } = await supabase.from('teacher_settings').upsert(payload);
    if (error) return alert(error.message);
    await loadAll();
  }

  async function addHoliday(){
    const start_date = $('holidayStart').value;
    const end_date = $('holidayEnd').value;
    if (!start_date || !end_date) return alert('Set both holiday dates.');
    const { error } = await supabase.from('holiday_ranges').insert({ teacher_id: state.user.id, start_date, end_date });
    if (error) return alert(error.message);
    $('holidayStart').value = '';
    $('holidayEnd').value = '';
    await loadAll();
  }

  async function addCycle(){
    const start_date = $('newCycleStart').value;
    const end_date = $('newCycleEnd').value;
    if (!start_date || !end_date) return alert('Set both cycle dates.');
    const { error } = await supabase.from('cycles').insert({ teacher_id: state.user.id, start_date, end_date });
    if (error) return alert(error.message);
    $('newCycleStart').value = '';
    $('newCycleEnd').value = '';
    await loadAll();
  }

  async function addStudent(){
    const name = $('newStudentName').value.trim();
    if (!name) return alert('Enter a student name.');
    const { error } = await supabase.from('students').insert({ teacher_id: state.user.id, name });
    if (error) return alert(error.message);
    $('newStudentName').value = '';
    await loadAll();
  }

  async function saveGoal(cycleId, studentId){
    const goal_topics = Number(document.getElementById(`goal_${studentId}`).value || 0);
    const { error } = await supabase.from('cycle_goals').upsert({
      cycle_id: cycleId,
      student_id: studentId,
      teacher_id: state.user.id,
      goal_topics
    });
    if (error) return alert(error.message);
    await loadGoals();
    renderGoalList();
    await renderDashboard();
  }

  async function addLog(studentId){
    const log_date = $('newLogDate').value;
    const minutes_in_aleks = Number($('newMinutes').value || 0);
    const topics_completed = Number($('newTopics').value || 0);
    const focus = Number($('newFocus').value || 3);
    const disruption = Number($('newDisruption').value || 0);
    const note = $('newNote').value || '';

    const { error } = await supabase.from('daily_logs').insert({
      teacher_id: state.user.id,
      student_id: studentId,
      log_date,
      minutes_in_aleks,
      topics_completed,
      focus,
      disruption,
      dedication: 0,
      note
    });

    if (error) return alert(error.message);
    await renderDashboard();
  }

  async function deleteHoliday(id){
    if (!confirm('Delete this holiday range?')) return;
    const { error } = await supabase.from('holiday_ranges').delete().eq('id', id);
    if (error) return alert(error.message);
    await loadAll();
  }

  async function deleteCycle(id){
    if (!confirm('Delete this cycle?')) return;
    await supabase.from('cycle_goals').delete().eq('cycle_id', id);
    const { error } = await supabase.from('cycles').delete().eq('id', id);
    if (error) return alert(error.message);
    await loadAll();
  }

  async function deleteStudent(id){
    if (!confirm('Delete this student?')) return;
    await supabase.from('daily_logs').delete().eq('student_id', id);
    await supabase.from('cycle_goals').delete().eq('student_id', id);
    const { error } = await supabase.from('students').delete().eq('id', id);
    if (error) return alert(error.message);
    await loadAll();
  }

  async function deleteLog(id){
    if (!confirm('Delete this log entry?')) return;
    const { error } = await supabase.from('daily_logs').delete().eq('id', id);
    if (error) return alert(error.message);
    await renderDashboard();
  }

  function bindTabs(){
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        ['dashboardTab', 'manageTab'].forEach(id => $(id).classList.add('hidden'));
        $(btn.dataset.tab).classList.remove('hidden');
      });
    });
  }

  async function refreshSessionUI(){
    const { data: { session } } = await supabase.auth.getSession();
    state.user = session?.user || null;

    if (state.user){
      $('authView').classList.add('hidden');
      $('appView').classList.remove('hidden');
      $('teacherInfo').textContent = state.user.email;
      await loadAll();
    } else {
      $('authView').classList.remove('hidden');
      $('appView').classList.add('hidden');
    }
  }

  $('signInBtn').addEventListener('click', signIn);
  $('signUpBtn').addEventListener('click', signUp);
  $('logoutBtn').addEventListener('click', signOut);
  $('saveDaysBtn').addEventListener('click', saveTeachingDays);
  $('addHolidayBtn').addEventListener('click', addHoliday);
  $('addCycleBtn').addEventListener('click', addCycle);
  $('addStudentBtn').addEventListener('click', addStudent);
  $('dashCycle').addEventListener('change', renderDashboard);
  $('dashStudent').addEventListener('change', renderDashboard);
  $('goalCycle').addEventListener('change', async () => {
    await loadGoals();
    renderGoalList();
  });

  window.saveGoal = saveGoal;
  window.addLog = addLog;
  window.deleteHoliday = deleteHoliday;
  window.deleteCycle = deleteCycle;
  window.deleteStudent = deleteStudent;
  window.deleteLog = deleteLog;

  bindTabs();
  supabase.auth.onAuthStateChange(async () => { await refreshSessionUI(); });
  await refreshSessionUI();
</script>
</body>
</html>
